# Development override: only postgres + worker, web runs via `pnpm dev`
services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: mawsim
      POSTGRES_USER: mawsim
      POSTGRES_PASSWORD: mawsim_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./packages/db/src/migrations/0000_init.sql:/docker-entrypoint-initdb.d/00_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mawsim -d mawsim"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data_dev:
