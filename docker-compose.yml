services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: mawsim
      POSTGRES_USER: mawsim
      POSTGRES_PASSWORD: mawsim_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/db/src/migrations/0000_init_tables.sql:/docker-entrypoint-initdb.d/00_init_tables.sql
      - ./packages/db/src/migrations/0001_rls_policies.sql:/docker-entrypoint-initdb.d/01_rls_policies.sql
      - ./packages/db/src/migrations/0002_access_audit_logs.sql:/docker-entrypoint-initdb.d/02_access_audit_logs.sql
      - ./packages/db/src/migrations/0003_farmer_public_profile.sql:/docker-entrypoint-initdb.d/03_farmer_public_profile.sql
      - ./packages/db/src/migrations/0004_deal_offer_policies.sql:/docker-entrypoint-initdb.d/04_deal_offer_policies.sql
      - ./packages/db/src/migrations/0005_escrow_funding.sql:/docker-entrypoint-initdb.d/05_escrow_funding.sql
      - ./packages/db/src/migrations/0006_offers_id_default.sql:/docker-entrypoint-initdb.d/06_offers_id_default.sql
      - ./packages/db/src/migrations/0007_reviews_notifications_rls.sql:/docker-entrypoint-initdb.d/07_reviews_notifications_rls.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mawsim -d mawsim"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mawsim:mawsim_dev@postgres:5432/mawsim
      NODE_ENV: production

  worker:
    build:
      context: .
      dockerfile: packages/db/Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mawsim:mawsim_dev@postgres:5432/mawsim
      NODE_ENV: production

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
